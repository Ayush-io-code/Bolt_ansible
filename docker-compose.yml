version: "3.9"

services:

  # ── Backend: Flask API + Ansible engine ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: bolt-backend
    ports:
      - "5000:5000"
    volumes:
      - ./ansible:/ansible
      - ./backend:/app
      - ansible_logs:/ansible/logs
      - ./ssh-keys/bolt_rsa:/root/.ssh/id_rsa:ro
    environment:
      - FLASK_ENV=development
      - ANSIBLE_BASE=/ansible
    networks:
      bolt-net:
        ipv4_address: 172.30.0.10

  # ── Frontend: Nginx serving static HTML/JS ───────────────────────────────────
  frontend:
    build: ./frontend
    container_name: bolt-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      bolt-net:
        ipv4_address: 172.30.0.11

  # ── Target host 1 ────────────────────────────────────────────────────────────
  target-host-1:
    build:
      context: .
      dockerfile: ./docker/target-host/Dockerfile
    container_name: bolt-host1
    hostname: host1.bolt.local
    networks:
      bolt-net:
        ipv4_address: 172.30.0.21

  # ── Target host 2 ────────────────────────────────────────────────────────────
  target-host-2:
    build:
      context: .
      dockerfile: ./docker/target-host/Dockerfile
    container_name: bolt-host2
    hostname: host2.bolt.local
    networks:
      bolt-net:
        ipv4_address: 172.30.0.22

networks:
  bolt-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  ansible_logs:
