name: Bolt CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ayush-io-code/bolt-backend
  FRONTEND_IMAGE: ghcr.io/ayush-io-code/bolt-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Test Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 backend/app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/app.py --count --max-line-length=120 --statistics || true

      - name: Run backend health check (smoke test)
        run: |
          cd backend
          ANSIBLE_BASE=/tmp python app.py &
          FLASK_PID=$!
          sleep 5
          curl -sf http://localhost:5000/api/health | grep '"status": "ok"' || \
            (echo "❌ Health check failed" && kill $FLASK_PID && exit 1)
          kill $FLASK_PID
          echo "✅ Backend health check passed"

  # ─────────────────────────────────────────────
  # JOB 2: Lint Frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          [ -s frontend/index.html ] && echo "✅ index.html present" || \
            (echo "❌ index.html missing" && exit 1)

      - name: Check nginx config syntax
        run: |
          # Replace proxy_pass with localhost so upstream resolves in CI
          sed 's|proxy_pass http://bolt-backend:5000;|proxy_pass http://127.0.0.1:5000;|g' \
            frontend/nginx.conf > /tmp/test-nginx.conf
          docker run --rm \
            -v "/tmp/test-nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine nginx -t
          echo "✅ Nginx config valid"

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Images
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Tag: ${SHORT_SHA}"

      - name: Build & Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to WSL via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to WSL
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WSL_HOST }}
          username: ayush
          key: ${{ secrets.WSL_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "── Pulling latest images ──"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ayush-io-code --password-stdin

            docker pull ghcr.io/ayush-io-code/bolt-backend:latest
            docker pull ghcr.io/ayush-io-code/bolt-frontend:latest

            echo "── Navigating to project ──"
            cd /mnt/c/Projects/bolt_v12/bolt_new

            echo "── Restarting containers ──"
            export BACKEND_IMAGE=ghcr.io/ayush-io-code/bolt-backend:latest
            export FRONTEND_IMAGE=ghcr.io/ayush-io-code/bolt-frontend:latest
            docker compose down --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "── Verifying deployment ──"
            sleep 5
            curl -sf http://localhost:5000/api/health | grep '"status": "ok"' || \
              (echo "❌ Health check failed after deploy" && exit 1)
            echo "✅ Deployment successful — Bolt is live at http://localhost:8080"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Deployment succeeded — commit ${{ github.sha }}"
          else
            echo "❌ Deployment failed — check logs above"
          fi